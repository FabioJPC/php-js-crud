<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD JS Project</title>

    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <header class="bg-dark text-white py-4 mb-4">
        <h1 class="text-center m-0">PHP/JS CRUD Project</h1>
    </header>

    <main class="container">

        <section class="card border-0 p-4 mb-4 align-items-center ">
            <div 
                class="input-group w-50 d-flex align-items-center gap-2">
                <input 
                    type="text" 
                    placeholder="Search products by name or category..." 
                    class="rounded form-control"
                    id="search-input"
                >
                <button class="bg-transparent border-0" id="search-btn">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </section>
        
        <section class="card p-4 mb-4">
            <h2 class="mb-3">Products</h2>
            <div class="row g-3" id="products"></div>
        </section>

        <section class="card p-4">
            <h2 class="mb-3" id="form-title">Create Product</h2>

            <div id="form-error" class="alert alert-danger d-none" role="alert"></div>

            <form id="create-product-form" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>

                <div class="col-md-3">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" class="form-control" id="category" name="category" required>
                </div>

                <div class="col-md-3">
                    <label for="price" class="form-label">Price</label>
                    <input type="text" class="form-control" id="price" name="price" required>
                </div>

                <div class="col-md-3">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" class="form-control" id="stock" name="stock" required>
                </div>

                <div class="col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-dark flex-fill">Create</button>
                    <button type="button" id="cancel-edit" class="btn btn-outline-secondary" style="display:none;">Cancel</button>
                </div>
            </form>
        </section>
    </main>

    <div class="modal fade" id="delete-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Confirm delete</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this product?</p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button id="confirm-delete" type="button" class="btn btn-danger">Delete</button>
            </div>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
